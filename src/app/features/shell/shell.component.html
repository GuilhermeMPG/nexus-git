<div class="flex h-screen bg-gray-950">
  <app-toast />
  <!-- Sidebar -->
  <aside class="flex flex-col w-56 shrink-0 bg-gray-900 border-r border-gray-800">
    <!-- Logo / título -->
    <div class="flex items-center gap-2 px-5 py-5 border-b border-gray-800">
      <span class="text-indigo-400 text-xl">⬡</span>
      <span class="font-semibold text-white tracking-wide text-sm">Nexus Git</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
      <p class="px-3 pb-1 text-[10px] text-gray-600 uppercase tracking-wider">Fluxo de trabalho</p>
      @for (item of nav; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-indigo-600/20 text-indigo-300 border-l-2 border-indigo-500"
          class="flex items-center gap-3 px-3 py-2.5 rounded text-gray-400 hover:text-white hover:bg-gray-800 text-sm transition-colors cursor-pointer"
        >
          <span class="w-4 flex justify-center shrink-0">
            @switch (item.icon) {
              @case ('dashboard') { <svg lucideLayoutDashboard class="w-4 h-4"></svg> }
              @case ('sync')    { <svg lucideRefreshCw class="w-4 h-4"></svg> }
              @case ('link')    { <svg lucideLink2 class="w-4 h-4"></svg> }
              @case ('bug')     { <svg lucideBug class="w-4 h-4"></svg> }
              @case ('publish') { <svg lucideUpload class="w-4 h-4"></svg> }
            }
          </span>
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Footer: user + config + logout -->
    <div class="border-t border-gray-800 px-2 py-3 space-y-1">
      <a
        routerLink="/app/config"
        routerLinkActive="bg-indigo-600/20 text-indigo-300"
        class="flex items-center gap-3 px-3 py-2 rounded text-gray-400 hover:text-white hover:bg-gray-800 text-sm transition-colors cursor-pointer"
      >
        <svg lucideSettings class="w-4 h-4"></svg> Configurações
      </a>
      @if (session.user(); as u) {
        <div class="px-3 py-2">
          <div class="text-xs text-gray-300 font-medium truncate">{{ u.name }}</div>
          <div class="text-xs text-gray-600 truncate">@{{ u.username }}</div>
        </div>
      }
      <button
        (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2 rounded text-gray-500 hover:text-red-400 hover:bg-gray-800 text-sm transition-colors cursor-pointer"
      >
        <svg lucideLogOut class="w-4 h-4"></svg> Sair
      </button>
    </div>
  </aside>

  <!-- Conteúdo principal -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>
